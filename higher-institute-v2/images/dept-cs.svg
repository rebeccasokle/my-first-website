<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b5ed7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a3d8f;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg1)" rx="10"/>

  <!-- Laptop body -->
  <rect x="90" y="55" width="220" height="140" rx="8" fill="white" opacity="0.12"/>
  <rect x="100" y="65" width="200" height="120" rx="6" fill="#0a2d6e"/>
  <!-- Screen content (code lines) -->
  <rect x="112" y="78" width="80" height="6" rx="3" fill="#f0a500" opacity="0.9"/>
  <rect x="112" y="92" width="120" height="5" rx="2.5" fill="white" opacity="0.5"/>
  <rect x="120" y="104" width="100" height="5" rx="2.5" fill="#4fc3f7" opacity="0.8"/>
  <rect x="120" y="116" width="90" height="5" rx="2.5" fill="white" opacity="0.4"/>
  <rect x="112" y="128" width="70" height="5" rx="2.5" fill="#f0a500" opacity="0.7"/>
  <rect x="120" y="140" width="110" height="5" rx="2.5" fill="#4fc3f7" opacity="0.6"/>
  <rect x="120" y="152" width="85" height="5" rx="2.5" fill="white" opacity="0.35"/>
  <rect x="112" y="164" width="60" height="5" rx="2.5" fill="#f0a500" opacity="0.6"/>
  <!-- Cursor blink -->
  <rect x="175" y="164" width="8" height="5" rx="1" fill="white" opacity="0.9"/>

  <!-- Keyboard base -->
  <rect x="80" y="188" width="240" height="12" rx="4" fill="white" opacity="0.15"/>

  <!-- Floating code symbols -->
  <text x="330" y="80" font-family="Courier New, monospace" font-size="22" fill="white" opacity="0.2">&lt;/&gt;</text>
  <text x="30" y="120" font-family="Courier New, monospace" font-size="18" fill="white" opacity="0.18">{}</text>
  <text x="338" y="150" font-family="Courier New, monospace" font-size="16" fill="#4fc3f7" opacity="0.25">01</text>
  <text x="28" y="168" font-family="Courier New, monospace" font-size="14" fill="#f0a500" opacity="0.2">fn()</text>

  <!-- Circuit dots -->
  <circle cx="330" cy="170" r="4" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="346" cy="170" r="4" fill="#4fc3f7" opacity="0.4"/>
  <circle cx="362" cy="170" r="4" fill="#4fc3f7" opacity="0.4"/>
  <line x1="330" y1="170" x2="362" y2="170" stroke="#4fc3f7" stroke-width="1.5" opacity="0.3"/>

  <!-- Label -->
  <text x="200" y="210" font-family="Georgia, serif" font-size="11" fill="white" opacity="0.7" text-anchor="middle" letter-spacing="1.5">COMPUTER ENGINEERING</text>
</svg>
