  <rect x="150" y="380" width="400" height="30" rx="4" fill="white" opacity="0.15"/>
  <text x="350" y="401" font-family="Georgia, serif" font-size="13" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">HIGHER INSTITUTE OF TECHNOLOGY</text>
