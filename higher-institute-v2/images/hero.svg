  <!-- Main building (center) -->
  <rect x="220" y="120" width="260" height="230" fill="url(#buildingGrad)" rx="4"/>
  <!-- Windows grid main -->
  <rect x="235" y="140" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.3"/>
