  <rect x="517" y="215" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>
  <rect x="549" y="215" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>
  <rect x="581" y="215" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>
  <rect x="485" y="245" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>
  <rect x="517" y="245" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>
  <rect x="549" y="245" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>
  <rect x="581" y="245" width="22" height="18" rx="2" fill="#0b5ed7" opacity="0.2"/>

  <!-- Trees -->
  <rect x="52" y="310" width="8" height="30" fill="#0a3d8f"/>
  <ellipse cx="56" cy="302" rx="18" ry="20" fill="#0f6b30" opacity="0.85"/>
  <rect x="630" y="310" width="8" height="30" fill="#0a3d8f"/>
