  <rect x="315" y="175" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.25"/>
  <rect x="355" y="175" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.25"/>
  <rect x="395" y="175" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.25"/>

  <rect x="235" y="210" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.2"/>
  <rect x="275" y="210" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.2"/>
  <rect x="315" y="210" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.2"/>
  <rect x="355" y="210" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.2"/>
  <rect x="395" y="210" width="30" height="22" rx="3" fill="#0b5ed7" opacity="0.2"/>

