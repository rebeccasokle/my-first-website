<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 220" width="400" height="220">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3a00;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4a1a00;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#c07800;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg3)" rx="10"/>

  <!-- Grid lines background -->
  <line x1="50" y1="40" x2="50" y2="190" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="125" y1="40" x2="125" y2="190" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="200" y1="40" x2="200" y2="190" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="275" y1="40" x2="275" y2="190" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="350" y1="40" x2="350" y2="190" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="30" y1="80" x2="370" y2="80" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="30" y1="120" x2="370" y2="120" stroke="white" stroke-width="0.5" opacity="0.08"/>
  <line x1="30" y1="160" x2="370" y2="160" stroke="white" stroke-width="0.5" opacity="0.08"/>

  <!-- Rising line graph -->
  <polyline points="50,165 100,150 150,130 200,110 250,85 300,65 350,45" fill="none" stroke="#f0a500" stroke-width="3" stroke-linejoin="round"/>
  <!-- Area under graph -->
  <polygon points="50,165 100,150 150,130 200,110 250,85 300,65 350,45 350,185 50,185" fill="#f0a500" opacity="0.1"/>
  <!-- Data points -->
  <circle cx="50" cy="165" r="5" fill="#f0a500"/>
  <circle cx="100" cy="150" r="5" fill="#f0a500"/>
  <circle cx="150" cy="130" r="5" fill="#f0a500"/>
  <circle cx="200" cy="110" r="5" fill="#f0a500"/>
  <circle cx="250" cy="85" r="5" fill="#f0a500"/>
  <circle cx="300" cy="65" r="5" fill="#f0a500"/>
  <circle cx="350" cy="45" r="6" fill="white"/>
  <circle cx="350" cy="45" r="3" fill="#f0a500"/>

  <!-- Coin stack -->
  <ellipse cx="320" cy="165" rx="28" ry="8" fill="url(#coinGrad)" opacity="0.9"/>
  <rect x="292" y="148" width="56" height="17" fill="url(#coinGrad)" opacity="0.85"/>
  <ellipse cx="320" cy="148" rx="28" ry="8" fill="#f0c040" opacity="0.9"/>
  <rect x="292" y="133" width="56" height="15" fill="#e0a030" opacity="0.8"/>
  <ellipse cx="320" cy="133" rx="28" ry="8" fill="#f0c040" opacity="0.95"/>
  <text x="320" y="137" font-family="Georgia,serif" font-size="11" fill="#7c3a00" text-anchor="middle" font-weight="bold">$</text>

  <!-- Percent badge -->
  <circle cx="75" cy="80" r="22" fill="white" opacity="0.12"/>
  <text x="75" y="86" font-family="Georgia,serif" font-size="16" fill="white" font-weight="bold" text-anchor="middle">%</text>

  <!-- Label -->
  <text x="200" y="210" font-family="Georgia, serif" font-size="11" fill="white" opacity="0.7" text-anchor="middle" letter-spacing="1.5">SCHOOL OF FINANCE</text>
</svg>
